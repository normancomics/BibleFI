
<!DOCTYPE html>
<html>
<head>
  <title>Bible.fi - Farcaster Frame</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Biblical Fonts from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  
  <!-- Basic Open Graph meta tags -->
  <meta property="og:title" content="Bible.fi - Biblical Financial Wisdom" />
  <meta property="og:description" content="Learn biblical principles for your financial journey." />
  <meta property="og:image" content="https://biblefi.base.eth/lovable-uploads/cc7f6bb4-ec25-48d5-84c4-78292783c823.png" />
  
  <!-- Farcaster Frame meta tags -->
  <meta property="fc:frame" content="vNext" />
  <meta property="fc:frame:image" content="https://biblefi.base.eth/lovable-uploads/cc7f6bb4-ec25-48d5-84c4-78292783c823.png" />
  <meta property="fc:frame:image:aspect_ratio" content="1.91:1" />
  <meta property="fc:frame:button:1" content="Biblical Wisdom" />
  <meta property="fc:frame:button:1:action" content="link" />
  <meta property="fc:frame:button:1:target" content="https://biblefi.base.eth/wisdom" />
  <meta property="fc:frame:button:2" content="DeFi Swaps" />
  <meta property="fc:frame:button:2:action" content="link" />
  <meta property="fc:frame:button:2:target" content="https://biblefi.base.eth/defi" />
  <meta property="fc:frame:button:3" content="Share Wisdom" />
  <meta property="fc:frame:button:3:action" content="post" />
  <meta property="fc:frame:post_url" content="https://biblefi.base.eth/api/frame" />
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #9B87F5;
      color: #fff;
      font-family: 'Cinzel', 'Playfair Display', system-ui, -apple-system, sans-serif;
    }
    
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
      background-image: linear-gradient(135deg, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.1) 100%);
    }
    
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      font-weight: 600;
      font-family: 'Cinzel', serif;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }
    
    p {
      font-family: 'Playfair Display', serif;
    }
    
    .card {
      background: rgba(139, 92, 246, 0.3);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
      max-width: 500px;
    }
    
    .footer {
      font-size: 12px;
      opacity: 0.6;
      font-family: 'Cinzel', serif;
      margin-top: 20px;
    }
    
    .title {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #FFD700;
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    }
    
    .subtitle {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div>
      <div class="title">Bible.fi</div>
      <p class="subtitle">Biblical wisdom for your financial journey</p>
      
      <div class="card">
        <p style="margin:0;font-size:14px;">This is a Farcaster Frame. View it in a Farcaster client like Warpcast for the full experience.</p>
      </div>
      
      <div class="footer">
        <p>Made with ❤️ on Base Chain</p>
      </div>
    </div>
  </div>
  
  <script src="/api/frame.js"></script>
  <script>
    // Simple script to detect if we're in a Farcaster client
    document.addEventListener('DOMContentLoaded', function() {
      const isFarcasterClient = navigator.userAgent.includes('Farcaster') || window.location.href.includes('warpcast.com');
      if (isFarcasterClient) {
        console.log('Detected Farcaster client!');
      }
    });
  </script>
</body>
</html>
