<!DOCTYPE html>
<html>
<head>
  <title>Bible.fi</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Pixel Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
  
  <!-- Open Graph meta tags -->
  <meta property="og:title" content="Bible.fi" />
  <meta property="og:description" content="Biblical wisdom for DeFi on Base Chain" />
  <meta property="og:image" content="https://ojiipppypzigjnjblbzn.supabase.co/functions/v1/generate-image?type=default" />
  
  <!-- Farcaster Frame meta tags -->
  <meta property="fc:frame" content="vNext" />
  <meta property="fc:frame:image" content="https://ojiipppypzigjnjblbzn.supabase.co/functions/v1/generate-image?type=default" />
  <meta property="fc:frame:image:aspect_ratio" content="1.91:1" />
  <meta property="fc:frame:button:1" content="🏛️ Enter DApp" />
  <meta property="fc:frame:button:1:action" content="link" />
  <meta property="fc:frame:button:1:target" content="https://biblefi.base.eth" />
  <meta property="fc:frame:button:2" content="📖 Wisdom" />
  <meta property="fc:frame:button:2:action" content="link" />
  <meta property="fc:frame:button:2:target" content="https://biblefi.base.eth/wisdom" />
  <meta property="fc:frame:button:3" content="🚀 DeFi" />
  <meta property="fc:frame:button:3:action" content="link" />
  <meta property="fc:frame:button:3:target" content="https://biblefi.base.eth/defi" />
  <meta property="fc:frame:button:4" content="⛪ Tithe" />
  <meta property="fc:frame:button:4:action" content="link" />
  <meta property="fc:frame:button:4:target" content="https://biblefi.base.eth/tithe" />
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background: hsl(220, 27%, 8%);
      color: hsl(0, 0%, 98%);
      font-family: 'JetBrains Mono', monospace;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      text-align: center;
      background: linear-gradient(135deg, hsl(220, 27%, 8%) 0%, hsl(220, 27%, 12%) 100%);
    }
    
    .logo {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 8px hsl(45, 100%, 55%));
    }
    
    .title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      color: hsl(45, 100%, 55%);
      text-shadow: 2px 2px 0px hsl(0, 0%, 0%);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    
    .subtitle {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 24px;
      color: hsl(280, 100%, 65%);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .features {
      background: hsl(220, 27%, 12%);
      border: 2px solid hsl(280, 100%, 65%);
      padding: 16px;
      margin: 16px 0;
      max-width: 400px;
      box-shadow: 4px 4px 0px hsl(0, 0%, 0%);
    }
    
    .feature-list {
      font-size: 10px;
      line-height: 1.6;
      text-align: left;
      color: hsl(0, 0%, 95%);
      font-weight: 700;
    }
    
    .footer {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }
    
    .base-logo {
      width: 16px;
      height: 16px;
      image-rendering: pixelated;
    }
    
    .status {
      background: hsl(162, 100%, 45%);
      color: hsl(0, 0%, 0%);
      padding: 4px 8px;
      font-size: 8px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 8px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/bible-fi-brand-logo-v2.png" alt="Bible.fi" class="logo">
    
    <div class="title">Bible.fi</div>
    <p class="subtitle">Biblical DeFi on Base</p>
    
    <div class="features">
      <div class="feature-list">
        → STAKE $BIBLE TOKEN<br/>
        → DIGITAL TITHING<br/>
        → BIBLICAL WISDOM<br/>
        → BASE CHAIN DEFI
      </div>
      
      <div class="status">FRAME ACTIVE</div>
    </div>
    
    <div class="footer">
      <span>BUILT ON BASE</span>
      <img src="/lovable-uploads/922260ef-cba9-4437-9d77-07bcba6560aa.png" alt="Base" class="base-logo">
    </div>
  </div>
  
  <script>
    // Farcaster frame detection and interaction
    document.addEventListener('DOMContentLoaded', function() {
      const userAgent = navigator.userAgent;
      const isWarpcast = userAgent.includes('Warpcast') || userAgent.includes('Farcaster');
      const isFrame = window.parent !== window;
      
      if (isWarpcast || isFrame) {
        console.log('🚀 Bible.fi Frame loaded in Farcaster client');
        document.querySelector('.status').textContent = 'LIVE IN FARCASTER';
        document.querySelector('.status').style.background = 'hsl(162, 100%, 45%)';
      } else {
        console.log('📖 Bible.fi Frame preview mode');
        document.querySelector('.status').textContent = 'PREVIEW MODE';
        document.querySelector('.status').style.background = 'hsl(45, 100%, 55%)';
      }
      
      // Log frame configuration
      console.log('Frame buttons configured:', [
        '🏛️ Enter DApp',
        '📖 Wisdom', 
        '🚀 DeFi',
        '⛪ Tithe'
      ]);
    });
  </script>
</body>
</html>
